# Longer/heavier scenario intended for before/after policy comparison runs
# (e.g. `--policy baseline_first_fit` today, `--policy external_helicyn` once
# that Phase 2 adapter exists). Same fleet as demo.yaml, 48h duration and a
# denser workload so any difference between policies has more room to show
# up in cumulative energy/carbon/cost/thermal/SLA numbers.
simulation:
  timestep_minutes: 5
  duration_hours: 48
  seed: 42

fleet:
  sites:
    - site_id: "ONT-NORTH"
      region: "Ontario"
      racks: 4
      servers_per_rack: 16
      base_pue: 1.35
      cooling_reference_temp_c: 18
      carbon_profile: mixed_grid
      price_profile: moderate_price
      weather_profile: cool_weather

    - site_id: "CA-WEST"
      region: "California"
      racks: 4
      servers_per_rack: 16
      base_pue: 1.25
      cooling_reference_temp_c: 20
      carbon_profile: solar_duck_curve
      price_profile: volatile_price
      weather_profile: warm_weather

  server_profile:
    cpu_capacity_units: 100
    memory_capacity_gb: 512
    gpu_capacity_units: 0
    idle_power_w: 180
    max_cpu_dynamic_power_w: 470
    fan_overhead_w: 40
    sleep_power_w: 15

workload:
  llm_inference_jobs_per_hour_peak: 60
  llm_inference_jobs_per_hour_offpeak: 12
  batch_jobs_per_hour_day: 5
  batch_jobs_per_hour_night: 18
  online_service_jobs_per_hour: 22
  maintenance_jobs_per_day: 3
  cpu_demand_min_units: 2
  cpu_demand_max_units: 24
  memory_demand_min_gb: 2
  memory_demand_max_gb: 40
  max_delay_minutes_flexible: 120

policy:
  name: baseline_first_fit
  dvfs_state: balanced

memory_power_coefficient_w: 60
