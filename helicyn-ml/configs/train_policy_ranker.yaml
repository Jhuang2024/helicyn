model_name: policy_ranker
estimator: HistGradientBoostingRegressor
hyperparameters:
  max_depth: 6
  max_iter: 250
  random_state: 42
target: teacher_score
label_mode: teacher_generated_imitation_learning
teacher_weights:
  w_sla: 100.0
  w_power: 2.0
  w_carbon: 6.0
  w_price: 4.0
  w_thermal: 12.0
  w_fragmentation: 2.0
  w_delay: 8.0
  w_utilization: 2.0
  w_consolidation: 3.0
max_rows_per_split: 1500
seed: 42
