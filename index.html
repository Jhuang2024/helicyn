<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Pre-paint theme init: applies the saved theme before first paint to
         avoid a flash. Mirrors the original inline bootstrap. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('helicyn-theme');
          if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
        } catch (e) {}
        document.documentElement.className += ' js';
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0c" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>Helicyn | AI Coordination Layer for Data Center Energy</title>
    <meta
      name="description"
      content="Helicyn is an AI coordination layer for data centers: routing GPU workloads across compute, power, cooling, and carbon-aware energy scheduling."
    />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/favicon-180.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&family=Inter+Tight:wght@500..800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Google Analytics (preserved from the original site). -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JKY63R66Q6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());
      gtag('config', 'G-JKY63R66Q6');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Supabase runtime config must load before the React module reads it. -->
    <script src="/supabase-config.js?v=20260714"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
